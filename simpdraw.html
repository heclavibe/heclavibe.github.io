<body>
    <header>
        <h1 class="logo"><a href="index.html">Hec<span class="highlight">LA</span>vibe</a> SimpDraw Free Warez</h1>
      </header>
      <div class="toolbar">
        <div class="toolbar-group">
            <button id="add-rectangle">Add Rect</button>
            <button id="add-text">Add Text</button>
            <button id="delete-shape">Delete</button>
        </div>

        <div class="toolbar-group">
            <input type="color" class="swatchBox" id="rect-color-picker" title="Rectangle Color">
            <input type="range" id="rect-color-alpha" min="0" max="100" value="100" title="Opacity">
            <input type="number" id="corner-radius" value="0" min="0" max="100" title="Corner Radius">
        </div>

        <div class="toolbar-group">
            <select id="font-family" title="Font Family">
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Times New Roman">Times</option>
                <option value="Courier New">Courier</option>
            </select>
            <input type="number" id="text-size" value="16" min="8" max="72" title="Text Size">
            <input type="color" class="swatchBox" id="text-color-picker" title="Text Color">
        </div>

        <div class="toolbar-group">
            <select id="export-format" title="Export Format">
                <option value="hecdoc">.hecdoc</option>
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
            </select>
            <button id="export-drawing">Export</button>
            <input type="file" id="import-file" accept=".hecdoc, image/*" multiple title="Import File">
        </div>
    </div>

    <div class="canvas-container" id="canvas"></div>
    
    <div class="layers-panel" id="layers-panel">
        <h3>Layers</h3>
    </div>
    <footer>
        <p><a href="index.html">HecLAvibe</a> SimpDraw Free Warez - Create DIV art easily!</p>
        <p>&copy; 2025 Hector Torres. All rights reserved.</p>
      </footer>
    <script src="bscript.js"></script>
</body>
</html>
